name: ems_mobile_app
description: "Paramedic Triage Intake Application — field tool for logging critical patient data with offline persistence."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Navigation
  go_router: ^14.2.7
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Local persistence
  sqflite: ^2.3.3+1
  path: ^1.9.0
  # Fonts
  google_fonts: ^6.2.1
  # Connectivity
  connectivity_plus: ^6.0.3
  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6

flutter:
  uses-material-design: true
